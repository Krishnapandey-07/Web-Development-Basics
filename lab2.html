<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .form{
            padding: 50px ;
            margin: auto ;
            text-align: center;
            border: 5px solid black;
            width: 200px;
            background-color: skyblue;
            border-radius: 10%;
        
        }
        .heading{
            text-align: center;
        }
        input{
            padding: 10px;
            margin: 5px;
            border-radius: 5px;
            border: 2px solid gray;
            width: 200px;
            margin-left: auto;
            margin-right: auto;
            size: 180px;
        }
        #message{
            height: 50px;
            width: 200px;
        }
        button{
            padding: 10px 20px;
           background-color: blue; 
           color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            
        }
        html{
            font-size: 20px;
        }
            
    </style>
</head>
<body>
    <div class="heading">
    <h2 style="color: blue;">Contact Me</h2>
    </div>
    <form class="form">
        <label title="Enter your name">
            <input type="text" placeholder="Enter your name">
            <br>
            <br>
        <label title="Enter your email">
            <input type="text" placeholder="Enter your email">
            <br>
            <br>
        <label title="Your massage">
            <input type="text" id="message" placeholder="Your massage">
            <br>
            <br>
            <button type="button">Submit</button>
      

        
    </form>
</body>
</html>
