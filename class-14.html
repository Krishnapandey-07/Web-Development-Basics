<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex</title>
    <style>
        .flexitem{
            display: flex;
            flex-direction: row;
            border: 4px solid black;
            justify-content: space-between;
            height: 150px;
            align-items: center;
            width: 500px;
            flex-wrap: wrap-reverse;
            align-content: center;
        }
        .flexitem1{
            width: 120px;
        }
        .flexitem2{
            align-self: flex-end;
            order: 2;
            flex-basis: 120px;
            flex-grow: 2;
        }
    </style>
</head>
<body>
    <h1>Playbox Playground</h1>
    <div class="flexitem">
    <div class="flexitem1" style="background-color: skyblue;">I am first box</div>
     <div class="flexitem2" style="background-color: red">I am second box</div>
      <div class="flexitem3" style="background-color: green;">I am third box</div>
       <div class="flexitem4" style="background-color: yellow">I am fourth box</div>
        <div class="flexitem5" style="background-color: lightsalmon">I am fifth box</div>
        <div class="flexitem6" style="background-color: pink">I am sixth box</div>
        <div class="flexitem9" style="background-color: skyblue;">I am seventh box</div>
        <div class="flexitem8" style="background-color: red">I am eighth box</div>
        <div class="flexitem10" style="background-color: green;">I am nineth box</div>
        <div class="flexitem11" style="background-color: yellow">I am tenth box</div>
        <div class="flexitem12" style="background-color: lightsalmon">I am eleventh box</div>
        <div class="flexitem13" style="background-color: pink">I am twelth box</div>
     </div>
</body>
</html>
