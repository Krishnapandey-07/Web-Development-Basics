<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        padding: 0;
        margin: 0;
        background: linear-gradient(135deg, #667eea, #764ba2);
        font-family: Arial, Helvetica, sans-serif;
      }
      .navbar {
        background-color: #667eea;
        height: 80px;
        color: white;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .box1 {
        color: aliceblue;
        font-size: 30px;
        padding: 10px;
      }
      .box2 {
        text-decoration: none;
        color: aliceblue;
      }
      a {
        text-decoration: none;
        color: aliceblue;
        margin: 50px;
        font-size: 20px;
      }
     .home{
        margin: 180px;
        display: flex;
        
      }

      .homecontent{
        color: white;
        font-family: Arial, Helvetica, sans-serif;
        padding: 1px;
        margin: 10px;
      }
      img{
        width: 250px;
        height: 250px;
        border-radius: 50%;
        margin-left: 300px;
      }
      button{
        background-color: orangered;
        border-radius: 10px;
        padding: 10px;
        font-size: 20px;
        color: aliceblue;
      }
      button:hover{
        background-color: green;
        transition-duration: 3s;
        transform: scaleX(150%) scaleY(150%);
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="box1">My Portfolio</div>
      <div class="box2">
        <a href="#"> Home</a>
        <a href="#"> About</a>
        <a href="#"> Project</a>
        <a href="#"> Contact</a>
      </div>
    </nav>
    <div class="home">
      <div class="homecontent">
        <h1>Hi,I'm Krishna😎</h1>
        <h4>
          A first year student of computer science with(AI) at Vedam School of Technology📒.<br />
          Turning ideas into interactive,<br />user-friendly web
          applicaton.
        </h4>
        <button>View my work</button>
      </div>
      <div class="homeimage">
        <img src="" alt="">

      </div>
    </div>
  </body>
</html>
