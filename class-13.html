<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position</title>
    <style>
        .box{
            height: 250px;
            width: 200px; ;
            border: 4px solid black;
            background-color: lightblue;
        }
        .boxposition{
            left: 100px;
            position: relative;
            background-color: brown;
            height: 250px;
            width: 200px;
            border: 4px solid black;
        }
        .boxabsolute{
            position: absolute;
            top: 100px;
            left: 500px;
            border: 4px solid black;
            background-color: lightpink;
            height: 250px;
            width: 200px;
        }
        .boxfixed{
            position: fixed;
            right: 30px;
            bottom: 30px;
            background-color: skyblue;
            height: 250px;
            width: 200px;
            border: 4px solid black;
        }
        .boxsticky{
            position: sticky;
            background-color: yellow;
            height: 250px;
            width: 200px;
            border: 4px solid black;
            top: 200px;

        }
        .box1{
            height: 250px;
            width: 200px; ;
            border: 4px solid black;
            background-color: purple;
        }
    </style>
</head>
<body>
    <div class="box">I am static box</div>
     <div class="boxposition">I am positon box</div>
     <div class="boxabsolute">I am absolute box</div>
      <div class="boxfixed">I am fixed box</div>
      <div class="boxsticky">I am sticky box</div>
       <div class="box1">I am a box</div>
        <div class="box1">I am a box</div>
         <div class="box1">I am a box</div>
</body>
</html>
