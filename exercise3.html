<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Font Size Units</title>
  <style>
    .px-text{
        font-size: 10px;
        
    }
    .pt-text{
        font-size: 14pt;

    }
    .em-text{
        font-size: 1em;
    }
    .rem-text{
        font-size: 1.5rem;
    }
    .percent-text{
        font-size: 100%;
    }
  </style>

  <!--
  TODO 1: Set the root font-size in the html selector using rem units.
          Use: font-size: 20px on html (1rem = 20px)

  TODO 2.1: Style the class .px-text
            Use: font-size: 30px

  TODO 2.2: Style the class .pt-text
            Use: font-size: 24pt

  TODO 2.3: Style the class .em-text
            Use: font-size: 2em
            (Inside the nested <div>, use: font-size: 1.5em)

  TODO 2.4: Style the class .rem-text
            Use: font-size: 2.5rem

  TODO 2.5: Style the class .percent-text
            Use: font-size: 150%
            (Inside the nested <div>, use: font-size: 80%)
  -->

</head>
<body>

  <h1>Hello! I am Krishna👨‍🏫</h1>

  <div class="px-text">
    <h2>About my College</h2>
    <p>I study at Vedam school of technology.</p>
  </div>

  <div class="pt-text">
    <h2>Residency</h2>
    <p>I live in a hostel i.e. Your space in Pune, maharashtra.</p>
  </div>

  <div class="em-text">
    <h2>My Hobbies</h2>
    <p>I like Reading, Playing and Traveling</p>
  </div>

  <div class="rem-text">
    <h2>Friend</h2>
    <p>Ritesh Tiwari</p>
  </div>

  <div class="percent-text">
    <h2>Home</h2>
    <p>Gorakhpur.</p>
  </div>

</body>
</html>
