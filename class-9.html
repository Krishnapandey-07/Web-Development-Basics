<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font</title>
    <style>
        .font-style{
            font-family:cursive;
            font-size: 80px;
            font-weight: 1000;
            color: #154D71;
        }
        .transformation{
            text-transform: uppercase;
            font-size: 50px;
            color: #4D2D8C;
        }
        .decoration{
            text-decoration: underline;
            text-align: center;
            font-size: 50px;
            background-color: #08CB00;
            font-family: cursive;
        }
    </style>
</head>
<body>
    <h1 class="font-style">Hello! We are vedamians......</h1>

    <p class="transformation">i am krishna pandey</p>
    <p class="decoration">I am Ritesh Tiwari(THE CAPTON OF CRICKET) and I am Aditya Gupta from Your Space.</p>
    
</body>
</html>
