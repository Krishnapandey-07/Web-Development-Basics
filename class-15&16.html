<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
    <style>
        body{
            color: white;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
        }
        .bg{
            background-color: rgba(165, 42, 42, 0.953);
            padding: 10px 16px;
        }
        .nav{
            background-color: black;
            border-radius: 24px;
            display: flex;
            justify-content: space-between;
            padding: 16px;
        }
        .links{
            display: flex;
            flex-direction: row;
            gap: 16px;
        }
        .logo{
            font-size: 24px;
            font-weight: 700;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }
        a{
            text-decoration: none;
            color: grey;
        }

        a:hover{
            color: white;
        }
        .signup{
            display: flex;
            gap: 1rem;
        }
        .button{
            padding: 8px 16px;
            background-color: orangered;
            border-radius: 24px;
            border: none;
            color: white;
            font-weight: 500;
            font-size: 14px;
        }
        .button:hover{
            background-color: orangered;
        }
        </style>
</head>
<body>
    <div class="bg">
        <div class="nav">
            <div class="links">
                <a href="a">What's incuded</a>
                <a href="#">Stories</a>
                <a href="#">Our why</a>
                 <a href="#">FAQs</a>
            </div>
            <div class="logo">Superpower</div>
            <div class="signup">
                <a href="login">login</a>
                <button class="button">Start testing</button>
            </div>
        </div>
    </div>
</body>
</html>
