<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        a{
            text-decoration: underline;
            color: black;
        }
        a:hover{
            text-decoration: underline;
            color: gold;
        }
        li:first-child{
            color: red;
            border: 4px solid black;
            width: 80px;
        }
        li:nth-child(2){
            color: green;
        }
        li:last-child{
            color: blue;
        }
        li{
            color: brown;
        }
        p::first-letter{
            color: brown;
            font-size: 50px;
        }
    </style>

</head>
<body>
    <h1>Pseudo Selectors Demo</h1>
    <p>This is a paragraph to demonstrate pseudo-elements.</p>
    <a href="#">Hover over me</a>
    <ul>
        <li>First item</li>
         <li>Second item</li>
          <li>Third item</li>
    </ul>
    <p>This is a paragraph to demonstrate pseudo-elements.</p>
</body>
</html>
