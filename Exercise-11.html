<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 0%;
            padding: 0%;
            font-size: 50px;
        }
        .container{
            display: grid;
            width: 100%;
            height: 100%;
        }
        div{
            height: 150px;
            width: 100%;
        }
        .box1{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 2fr;
            background-color: bisque;
        }
        .box2{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 1fr;
            background-color: brown;
        }
        .box3{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 1fr;
            background-color: cadetblue;
        }
        .box4{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 1fr;
            background-color: cyan;
        }
        .box5{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 1fr;
            background-color: plum;
        }
    </style>
</head>
<body>
    <div class="container">
            <div class="box1">item 1</div>
            <div class="box2">item 2</div>
            <div class="box3">item 3</div>
            <div class="box4">item 4</div>
            <div class="box5">item 5</div>
    </div>
</body>
</html>
